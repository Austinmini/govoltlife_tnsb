name: Auto Blog Post Generator

on:
  schedule:
    # Publishes Monday, Wednesday, Friday at 9am UTC
    - cron: '0 9 * * 1'
    - cron: '0 9 * * 3'
    - cron: '0 9 * * 5'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3 rss-parser

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          AMAZON_CREDENTIAL_ID: ${{ secrets.AMAZON_CREDENTIAL_ID }}
          AMAZON_CREDENTIAL_SECRET: ${{ secrets.AMAZON_CREDENTIAL_SECRET }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
        run: node scripts/generate-post.mjs

      - name: Commit and push new post
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/blog/
          # NOTE: Do NOT use [skip ci] here — Cloudflare Pages watches for commits to trigger builds
          git diff --staged --quiet || git commit -m "Auto-publish: new blog post $(date +'%Y-%m-%d')"
          git push

      - name: Trigger Cloudflare Pages deploy webhook (optional backup)
        # Only runs if you've set a CF_DEPLOY_HOOK secret (see setup guide)
        if: ${{ secrets.CF_DEPLOY_HOOK != '' }}
        run: curl -X POST "${{ secrets.CF_DEPLOY_HOOK }}"
